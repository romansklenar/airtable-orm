name: CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }} (${{ matrix.gemfile }})
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.2'
          - '3.3'
          - '3.4'
          - '4.0'
        gemfile:
          - Gemfile
        include:
          # Oldest supported ActiveModel line — on the Rubies Rails 7.1 supports.
          - { ruby: '3.2', gemfile: gemfiles/activemodel_7_1.gemfile }
          - { ruby: '3.3', gemfile: gemfiles/activemodel_7_1.gemfile }

    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake
