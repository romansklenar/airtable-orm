plugins:
  - rubocop-packaging
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# The lib is extracted from a Rails app that caps lines at 120.
Layout/LineLength:
  Max: 120

Style/Documentation:
  Enabled: false

# The require shim must carry the dashed gem name so Bundler.require resolves it.
Naming/FileName:
  Exclude:
    - lib/airtable-orm.rb

# errors.rb deliberately packs the whole hierarchy into one loader-ignored file (Zeitwerk
# would demand it define Airtable::ORM::Errors); the entry point must define the Airtable
# namespace before Zeitwerk::Loader.for_gem_extension and reopen it after setup.
Style/OneClassPerFile:
  Exclude:
    - lib/airtable/orm.rb
    - lib/airtable/orm/errors.rb
