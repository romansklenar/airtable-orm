plugins:
  - rubocop-packaging
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# The lib is extracted from a Rails app that caps lines at 120.
Layout/LineLength:
  Max: 120

# Size heuristics don't gate this extracted, review-hardened lib.
Metrics:
  Enabled: false

# ActiveRecord-idiom public API: the association DSL is has_many/belongs_to, and
# save/update return booleans by contract — renaming them would break the point of the gem.
Naming/PredicatePrefix:
  AllowedMethods:
    - has_many

Naming/PredicateMethod:
  Enabled: false

# The spec suite is ported from the host app and keeps its house testing style —
# behaviour-lockdown examples with multiple assertions, message stubs and ivar-carried
# Faraday stubs. Restyling them would churn a review-hardened suite for no behaviour gain.
RSpec/MultipleExpectations:
  Enabled: false
RSpec/ExampleLength:
  Enabled: false
RSpec/MessageSpies:
  Enabled: false
RSpec/InstanceVariable:
  Enabled: false
RSpec/NoExpectationExample:
  Enabled: false
RSpec/StubbedMock:
  Enabled: false
RSpec/IndexedLet:
  Enabled: false
RSpec/LeakyConstantDeclaration:
  Enabled: false
RSpec/MultipleMemoizedHelpers:
  Enabled: false

Lint/ConstantDefinitionInBlock:
  Exclude:
    - spec/**/*

Style/Documentation:
  Enabled: false

# The require shim must carry the dashed gem name so Bundler.require resolves it.
Naming/FileName:
  Exclude:
    - lib/airtable-orm.rb

# errors.rb deliberately packs the whole hierarchy into one loader-ignored file (Zeitwerk
# would demand it define Airtable::ORM::Errors); the entry point must define the Airtable
# namespace before Zeitwerk::Loader.for_gem_extension and reopen it after setup.
Style/OneClassPerFile:
  Exclude:
    - lib/airtable/orm.rb
    - lib/airtable/orm/errors.rb
